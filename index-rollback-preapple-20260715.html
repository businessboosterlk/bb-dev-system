<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>BB Dev OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%233b82f6'/><path d='M8 9l-3 3 3 3M16 9l3 3-3 3M13 7l-2 10' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ================================================================
   BB DEV OS - single-file internal system
   Skin: BB Command Centre v2 tokens, accent BLUE (the Dev OS cue;
   CC orange, graphic pink, video purple, smm cyan, leads orange)
   ================================================================ */
:root{
  --bg:#0b0c0f; --surface:#131419; --surface-2:#1a1c22; --surface-3:#23252d;
  --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.13);
  --accent:#3b82f6; --accent-2:#2563eb;
  --accent-glow:rgba(59,130,246,0.18); --accent-soft:rgba(59,130,246,0.10);
  --text:#eef0f4; --text-2:#a9adba; --text-3:#8a8f9e;
  --green:#22c55e; --green-soft:rgba(34,197,94,0.11);
  --amber:#f59e0b; --amber-soft:rgba(245,158,11,0.11);
  --red:#ef4444; --red-soft:rgba(239,68,68,0.11);
  --blue:#3b82f6; --blue-soft:rgba(59,130,246,0.11);
  --purple:#a855f7; --purple-soft:rgba(168,85,247,0.11);
  --pink:#ec4899; --pink-soft:rgba(236,72,153,0.11);
  --sidebar-w:232px; --topbar-h:56px;
  --r-lg:16px; --r:12px; --r-md:10px; --r-sm:8px; --r-xs:6px;
  --fs-micro:11px; --fs-sm:12.5px; --fs-body:14px; --fs-md:15px; --fs-lg:18px; --fs-xl:22px; --fs-2xl:28px; --fs-3xl:34px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px; --s8:40px; --s10:56px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.4); --shadow:0 4px 14px rgba(0,0,0,.45);
  --shadow-md:0 10px 30px rgba(0,0,0,.5); --shadow-lg:0 24px 60px rgba(0,0,0,.6);
  --ease:cubic-bezier(.16,1,.3,1); --t-fast:.15s; --t:.25s;
}
[data-theme="light"]{
  --bg:#f4f4f8; --surface:#ffffff; --surface-2:#ededf4; --surface-3:#e2e2ec;
  --border:rgba(10,10,30,0.08); --border-strong:rgba(10,10,30,0.16);
  --accent:#2563eb; --accent-2:#1d4ed8;
  --accent-glow:rgba(37,99,235,0.18); --accent-soft:rgba(37,99,235,0.09);
  --text:#0d0d18; --text-2:#4a5568; --text-3:#8896ab;
  --green:#16a34a; --green-soft:rgba(22,163,74,0.09);
  --amber:#d97706; --amber-soft:rgba(217,119,6,0.09);
  --red:#dc2626; --red-soft:rgba(220,38,38,0.09);
  --blue:#2563eb; --blue-soft:rgba(37,99,235,0.09);
  --purple:#9333ea; --purple-soft:rgba(147,51,234,0.09);
  --pink:#db2777; --pink-soft:rgba(219,39,119,0.09);
  --shadow-xs:0 1px 2px rgba(20,20,30,.05),0 1px 1px rgba(20,20,30,.04);
  --shadow:0 2px 6px rgba(20,20,30,.06),0 6px 16px rgba(20,20,30,.06);
  --shadow-md:0 6px 14px rgba(20,20,30,.08),0 14px 34px rgba(20,20,30,.10);
  --shadow-lg:0 18px 40px rgba(20,20,30,.14),0 30px 70px rgba(20,20,30,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.55;
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
[hidden]{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
svg{flex-shrink:0}
.ic{width:16px;height:16px}
::selection{background:var(--accent);color:#fff}
:focus-visible{outline:none;box-shadow:0 0 0 3px var(--accent-glow);border-radius:var(--r-sm)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.06s!important}}

/* ---------- login ---------- */
#loginScreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;overflow-y:auto;-webkit-overflow-scrolling:touch}
.login-card{margin:auto;width:min(92vw,380px);background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow-lg);padding:34px 30px;animation:slideUp .25s var(--ease)}
.login-logo{text-align:center;margin-bottom:16px}
.login-logo img{width:152px;max-width:66%;height:auto;display:inline-block}
[data-theme="light"] .login-logo img,[data-theme="light"] .sb-logo-img{filter:invert(1)}
.login-sub{text-align:center;color:var(--accent);font-size:10.5px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;margin-bottom:7px}
.login-date{text-align:center;color:var(--text-3);font-size:12px;margin-bottom:22px}
.lg-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;font-weight:700;font-size:13px;display:grid;place-items:center;flex-shrink:0}
.login-field{width:100%;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:var(--r-sm);
  padding:13px 15px;font-size:13.5px;margin-bottom:11px;transition:border-color var(--t-fast),box-shadow var(--t-fast)}
.login-field:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.login-field::placeholder{color:var(--text-3)}
.login-err{color:var(--red);font-size:11.5px;text-align:center;min-height:16px;margin-top:10px}
.login-mode{text-align:center;margin-top:14px;font-size:10px;color:var(--text-3);letter-spacing:.06em;font-weight:600}

/* ---------- shell ---------- */
#app{display:none}
#app.on{display:block}
.sidebar{position:fixed;top:0;bottom:0;width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);box-shadow:var(--shadow-xs);z-index:60;display:flex;flex-direction:column;
  transition:left .28s cubic-bezier(.4,0,.2,1)}
@media(min-width:901px){.sidebar{left:0}.main{margin-left:var(--sidebar-w)}}
@media(max-width:900px){.sidebar{left:-250px}.sidebar.open{left:0}.main{margin-left:0}}
.sb-brand{padding:16px 16px 13px;border-bottom:1px solid var(--border)}
.sb-logo-img{width:138px;max-width:82%;height:auto;display:block;margin-bottom:11px}
.sb-sub{font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:11px}
.sb-clock{display:flex;align-items:baseline;gap:8px}
.sb-clock-time{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;color:var(--text)}
.sb-clock-date{font-size:10.5px;color:var(--text-3)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px 12px}
.nav-sec{padding:16px 11px 6px;font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.04em}
.nav-item{position:relative;display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;
  font-weight:500;font-size:13px;color:var(--text-2);width:100%;text-align:left;margin-bottom:2px;
  transition:background var(--t-fast),color var(--t-fast)}
.nav-item svg{width:16px;height:16px}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.nav-item.active::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:99px;background:var(--accent)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9.5px;font-weight:800;min-width:17px;height:17px;
  border-radius:99px;display:grid;place-items:center;padding:0 5px}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-foot .lg-av{width:30px;height:30px;font-size:11px}
.sb-foot b{font-size:12px;display:block;line-height:1.2}
.sb-foot span{font-size:10px;color:var(--text-3)}
.sb-out{margin-left:auto;color:var(--text-3);padding:6px;border-radius:8px}
.sb-out:hover{color:var(--red);background:var(--red-soft)}
.nav-mask{display:none}
@media(max-width:900px){.nav-mask.on{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55;animation:fadeIn .2s}}

.topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);display:flex;align-items:center;gap:12px;
  padding:0 18px;border-bottom:1px solid var(--border);
  background:color-mix(in srgb,var(--bg) 78%,transparent);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px)}
.tb-menu{display:none;width:38px;height:38px;border-radius:10px;place-items:center;color:var(--text-2);flex-shrink:0}
.tb-menu:hover{background:var(--surface-2)}
.tb-menu svg{width:20px;height:20px}
@media(max-width:900px){.tb-menu{display:grid}}
.tb-title{font-size:14.5px;font-weight:700;letter-spacing:-.01em;
  min-width:0;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);position:relative}
.tb-btn:hover{background:var(--surface-2);color:var(--text)}
.tb-btn svg{width:17px;height:17px}
.tb-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.mode-chip{font-size:9px;font-weight:800;letter-spacing:.1em;padding:4px 9px;border-radius:99px;text-transform:uppercase}
.mode-chip.demo{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.mode-chip.live{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,.25)}

.content{padding:26px 28px 52px;max-width:1500px;margin:0 auto}
@media(max-width:900px){.content{padding:16px 16px 40px}}
/* ---------- the marquee (signature page header) ---------- */
.marquee{position:relative;overflow:hidden;padding:8px 0 24px;margin-bottom:4px}
.marquee::before{content:"";position:absolute;top:-170px;left:-150px;width:860px;height:580px;pointer-events:none;z-index:0;
  background:radial-gradient(closest-side,color-mix(in srgb,var(--accent) 20%,transparent),transparent);opacity:1}
.marquee>*{position:relative}
.mq-kicker{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.13em;
  text-transform:uppercase;color:var(--accent);margin-bottom:11px}
.mq-title{margin:0;font-size:var(--fs-2xl);font-weight:700;letter-spacing:-.03em;line-height:1.08;color:var(--text)}
.mq-sub{font-size:var(--fs-body);color:var(--text-2);margin-top:9px;max-width:64ch;line-height:1.5}
@media(max-width:900px){.marquee{padding:2px 0 18px}.mq-title{font-size:23px}}
.page{display:none;animation:fadeIn .18s}
.page.active{display:block}

/* ---------- shared components ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.card-h{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-h h3{font-size:var(--fs-md);font-weight:700;letter-spacing:-.015em}
.card-h .sp{margin-left:auto;display:flex;gap:8px;align-items:center}
.card-b{padding:18px 20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:19px 20px;
  transition:transform var(--t-fast) var(--ease),border-color var(--t-fast),box-shadow var(--t) var(--ease)}
.stat-card:hover{transform:translateY(-1px);border-color:var(--border-strong);box-shadow:var(--shadow-xs)}
.stat-lbl{font-size:12px;font-weight:600;color:var(--text-3);margin-bottom:9px}
.stat-val{font-size:32px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1.05}
.stat-val.accent{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.amber{color:var(--amber)}
.stat-note{font-size:12px;color:var(--text-3);margin-top:7px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2.5px 8px;border-radius:var(--r-xs);letter-spacing:.01em;text-transform:capitalize}
.badge.red{background:var(--red-soft);color:var(--red)}
.badge.green{background:var(--green-soft);color:var(--green)}
.badge.amber{background:var(--amber-soft);color:var(--amber)}
.badge.blue{background:var(--blue-soft);color:var(--blue)}
.badge.purple{background:var(--purple-soft);color:var(--purple)}
.badge.pink{background:var(--pink-soft);color:var(--pink)}
.badge.neutral{background:var(--surface-2);color:var(--text-2)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:7px;color:#fff;font-weight:700;font-size:13px;
  padding:11px 18px;border-radius:var(--r-sm);
  background:var(--accent);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 1px 2px rgba(0,0,0,.35);
  transition:filter var(--t-fast),transform var(--t-fast) var(--ease)}
.btn-primary:hover{filter:brightness(1.09)}
.btn-primary:active{transform:scale(.97)}
.btn-primary svg{width:15px;height:15px}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:13px;color:var(--text-2);
  padding:10px 16px;border-radius:var(--r-sm);border:1px solid var(--border-strong);background:var(--surface);
  transition:border-color var(--t-fast),color var(--t-fast),transform var(--t-fast) var(--ease)}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn-ghost svg{width:14px;height:14px}
.btn-danger{border-color:rgba(239,68,68,.35);color:var(--red)}
.btn-danger:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.btn-sm{padding:8px 13px;font-size:12px}
.tab-group{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:3px;gap:3px;box-shadow:inset 0 1px 2px rgba(0,0,0,.18)}
.tab-btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap;
  transition:background var(--t-fast),color var(--t-fast)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:700;box-shadow:var(--shadow-xs)}
.seg-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
@media(max-width:900px){.seg-bar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch}}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;min-width:560px}
.tbl th{font-size:12px;font-weight:600;color:var(--text-3);
  text-align:left;padding:11px 14px;border-bottom:1px solid var(--border)}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background var(--t-fast)}
.tbl tbody tr:hover{background:var(--surface-2)}
.empty-state{padding:46px 24px;text-align:center}
.empty-state svg{width:34px;height:34px;color:var(--text-3);margin:0 auto 10px}
.empty-title{font-size:15px;font-weight:700;color:var(--text-2)}
.empty-sub{font-size:12.5px;color:var(--text-3);margin-top:5px}
.skel{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--surface-2) 0%,var(--surface-3) 50%,var(--surface-2) 100%);
  background-size:200% 100%;animation:shimmer 1.4s ease infinite}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.mt{margin-top:20px}

/* ---------- forms ---------- */
.fld{margin-bottom:16px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--text-3);margin-bottom:7px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-strong);
  border-radius:var(--r-sm);padding:11px 14px;transition:border-color var(--t-fast)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.fld textarea{min-height:74px;resize:vertical}
.fld .hint{font-size:10.5px;color:var(--text-3);margin-top:4px}
.fld .warn{font-size:10.5px;color:var(--amber);margin-top:4px}
.frm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.frm-row{grid-template-columns:1fr}}

/* ---------- modal ---------- */
.modal-ov{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;overflow-y:auto;animation:fadeIn .18s;padding:22px 12px}
.modal{margin:auto;width:min(calc(100vw - 24px),640px);background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg);animation:slideUp .2s var(--ease)}
.modal.wide{width:min(calc(100vw - 24px),860px)}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-h h3{font-size:17px;font-weight:700;letter-spacing:-.015em;min-width:0;flex:1}
.modal-x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--text-3);flex-shrink:0}
.modal-x:hover{background:var(--surface-2);color:var(--text)}
.modal-x svg{width:16px;height:16px}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);z-index:300;background:var(--surface-3);
  color:var(--text);border:1px solid var(--border-strong);border-radius:var(--r-md);padding:11px 18px;font-size:12.5px;font-weight:600;
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:opacity var(--t) var(--ease),transform var(--t) var(--ease);max-width:min(92vw,480px)}
#toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}

/* ---------- board ---------- */
.board{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:12px;-webkit-overflow-scrolling:touch}
@media(max-width:900px){.board{scroll-snap-type:x mandatory}.stage-col{scroll-snap-align:start;width:82vw!important}}
.stage-col{width:272px;flex-shrink:0;background:transparent;
  display:flex;flex-direction:column;max-height:calc(100vh - 224px)}
.stage-header{padding:4px 6px 10px;display:flex;align-items:center;gap:8px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stage-title{font-size:12.5px;font-weight:600;color:var(--text-2);
  min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stage-count{margin-left:auto;background:var(--surface-2);color:var(--text-2);font-size:10.5px;font-weight:700;
  padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;flex-shrink:0}
.stage-cards{padding:2px 2px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:52px;border-radius:var(--r-md)}
.stage-cards.drop-target{background:var(--accent-soft)}
.stage-empty{font-size:11px;color:var(--text-3);font-style:italic;text-align:center;padding:10px 0}
.wcard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--text-3);border-radius:10px;
  padding:11px 12px;cursor:pointer;transition:transform var(--t-fast) var(--ease),box-shadow var(--t-fast),border-color var(--t-fast)}
.wcard:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow-xs)}
.wcard.dragging{opacity:.4;transform:scale(.95)}
.wcard.pr-urgent{border-left-color:var(--red)}
.wcard.pr-high{border-left-color:var(--amber)}
.wcard.pr-normal{border-left-color:var(--blue)}
.wcard.pr-low{border-left-color:var(--text-3)}
.wcard.is-blocked{border-left-color:var(--red);background:color-mix(in srgb,var(--red) 4%,var(--surface-2))}
.wc-top{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.wc-title{font-size:12.5px;font-weight:600;line-height:1.35;margin-bottom:7px;word-break:break-word}
.wc-meta{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--text-3);flex-wrap:wrap}
.wc-meta svg{width:11px;height:11px}
.wc-meta .late{color:var(--red);font-weight:700}
.wc-client{font-size:10.5px;font-weight:600;color:var(--text-3)}

/* ---------- keyring ---------- */
.key-grid-wrap{overflow-x:auto}
.key-grid{border-collapse:collapse;min-width:720px;width:100%}
.key-grid th{font-size:9.5px;font-weight:600;color:var(--text-3);
  padding:8px 6px;border-bottom:1px solid var(--border);text-align:center}
.key-grid th:first-child{text-align:left;padding-left:12px}
.key-grid td{padding:5px 6px;border-bottom:1px solid var(--border);text-align:center}
.key-grid td:first-child{text-align:left;padding-left:12px;font-size:12px;font-weight:600;white-space:nowrap}
.key-cell{width:30px;height:30px;border-radius:8px;display:inline-grid;place-items:center;cursor:pointer;
  border:1px solid var(--border);transition:transform var(--t-fast) var(--ease)}
.key-cell:hover{transform:scale(1.12)}
.key-cell svg{width:14px;height:14px}
.key-cell.have{background:var(--green-soft);color:var(--green);border-color:rgba(34,197,94,.3)}
.key-cell.missing{background:var(--red-soft);color:var(--red);border-color:rgba(239,68,68,.3)}
.key-cell.requested{background:var(--amber-soft);color:var(--amber);border-color:rgba(245,158,11,.3)}
.key-cell.lost{background:var(--surface-2);color:var(--text-3)}
.key-cell.na{background:transparent;border-style:dashed;color:var(--text-3)}

/* ---------- misc feature bits ---------- */
.hlist{display:flex;flex-direction:column}
.hrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:none}
.hrow .grow{min-width:0;flex:1}
.hrow b{font-size:12.5px;display:block;line-height:1.35;word-break:break-word}
.hrow small{font-size:10.5px;color:var(--text-3)}
.health-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.health-dot.green{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.5)}
.health-dot.amber{background:var(--amber);box-shadow:0 0 6px rgba(245,158,11,.5)}
.health-dot.red{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,.5)}
.comment{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:9px}
.comment .who{display:flex;gap:8px;align-items:baseline;margin-bottom:4px}
.comment .who b{font-size:11.5px}
.comment .who span{font-size:10px;color:var(--text-3)}
.comment p{font-size:12.5px;word-break:break-word}
.comment img{margin-top:8px;border-radius:8px;max-height:220px}
.stage-time{display:flex;flex-direction:column;gap:6px}
.st-row2{display:flex;align-items:center;gap:10px;font-size:11.5px}
.st-row2 .bar{flex:1;height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.st-row2 .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.st-row2 .lbl{width:120px;color:var(--text-2);font-weight:600;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-row2 .val{width:56px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text-3);flex-shrink:0}
.prog{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.chipline{display:flex;gap:6px;flex-wrap:wrap}
.copybox{background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:var(--r-sm);padding:12px;
  font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow-y:auto}

/* ---------- self-test overlay ---------- */
.st-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;padding:20px 12px;overflow-y:auto}
.st-panel{margin:auto;width:min(calc(100vw - 24px),620px);background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg)}
.st-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.st-badge{font-size:12px;font-weight:800;letter-spacing:.06em;padding:5px 13px;border-radius:99px}
.st-badge.pass{background:var(--green-soft);color:var(--green);border:1px solid rgba(34,197,94,.35)}
.st-badge.fail{background:var(--red-soft);color:var(--red);border:1px solid rgba(239,68,68,.35)}
.st-head .hint{font-size:11px;color:var(--text-3)}
.st-body{max-height:52vh;overflow-y:auto;padding:10px 18px}
.st-row{display:flex;gap:9px;align-items:flex-start;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-row>svg{width:14px;height:14px;margin-top:2px}
.st-row.p>svg{color:var(--green)}
.st-row.f>svg{color:var(--red)}
.st-row.f{color:var(--red);font-weight:600}
.st-row .det{color:var(--text-3);font-size:10.5px;display:block}
.st-foot{padding:13px 18px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ---------- hero (the Next Up card) ---------- */
.hero-wrap{display:flex;align-items:stretch;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.hero-greet{flex:1;min-width:220px;display:flex;flex-direction:column;justify-content:center}
.hero-hi{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)}
.hero-name{font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1.15;margin:4px 0 2px}
.hero-date{font-size:12px;color:var(--text-2)}
.hero-card{position:relative;overflow:hidden;flex:1;min-width:min(100%,300px);border-radius:var(--r-lg);padding:24px 26px;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 10px 28px var(--accent-glow);cursor:pointer;
  transition:transform var(--t-fast) var(--ease),box-shadow var(--t) var(--ease)}
.hero-card:hover{transform:translateY(-1px);box-shadow:0 12px 32px var(--accent-glow)}
.hero-card::before{content:"";position:absolute;inset:0;
  background:radial-gradient(420px 180px at 85% -20%,rgba(255,255,255,.16),transparent 60%),radial-gradient(300px 160px at -10% 120%,rgba(0,0,0,.22),transparent 60%)}
.hero-card>*{position:relative}
.hero-lbl{font-size:9.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.85}
.hero-title{font-size:var(--fs-xl);font-weight:700;letter-spacing:-.02em;line-height:1.2;margin:8px 0 6px;word-break:break-word}
.hero-meta{font-size:11.5px;opacity:.88;display:flex;gap:12px;flex-wrap:wrap}
.hero-cta{margin-top:12px}
.btn-light{display:inline-flex;align-items:center;gap:7px;color:#fff;font-weight:700;font-size:12px;padding:8px 14px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.30);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:background var(--t-fast)}
.btn-light:hover{background:rgba(255,255,255,.24)}
.btn-light svg{width:14px;height:14px}
/* stat icon tiles */
.stat-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.kt{width:32px;height:32px;border-radius:9px;background:transparent;border:1px solid var(--border);display:grid;place-items:center;color:var(--text-3);flex-shrink:0}
.kt svg{width:15px;height:15px}
/* card stage progress */
.wc-prog{height:3px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-top:9px}
.wc-prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.wc-prog i.full{background:var(--green)}
/* command palette */
.cmdk-ov{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:flex;justify-content:center;align-items:flex-start;padding:12vh 14px 20px;animation:fadeIn .15s}
.cmdk{width:min(560px,100%);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .18s var(--ease)}
.cmdk-in{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.cmdk-in svg{width:16px;height:16px;color:var(--text-3)}
.cmdk-in input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);min-width:0}
.cmdk-list{max-height:46vh;overflow-y:auto;padding:8px}
.cmdk-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-md);cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text-2)}
.cmdk-item svg{width:15px;height:15px;flex-shrink:0}
.cmdk-item span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-item.sel,.cmdk-item:hover{background:var(--accent-soft);color:var(--accent)}
.cmdk-item small{margin-left:auto;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;flex-shrink:0}
.cmdk-hint{padding:9px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text-3);display:flex;gap:14px;flex-wrap:wrap}
kbd{background:var(--surface-2);border:1px solid var(--border-strong);border-radius:5px;padding:1px 6px;font-family:inherit;font-size:9.5px}
/* login glow */
#loginScreen::before{content:"";position:fixed;inset:0;pointer-events:none;

window.__ST_LOG=[];
(function(){
 const rec=(kind,args)=>{try{window.__ST_LOG.push({kind:kind,msg:Array.from(args).map(a=>a&&a.message?a.message:String(a)).join(' ').slice(0,300),at:Date.now()});}catch(e){}};
 const ce=console.error.bind(console),cw=console.warn.bind(console);
 console.error=function(){rec('error',arguments);ce.apply(null,arguments);};
 console.warn=function(){rec('warn',arguments);cw.apply(null,arguments);};
 window.addEventListener('error',e=>rec('uncaught',[e.message||e.type]));
 window.addEventListener('unhandledrejection',e=>rec('rejection',[e.reason&&e.reason.message||String(e.reason)]));
})();

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function mapSafe(arr,fn){
 let skipped=0;
 const html=(arr||[]).map(function(x,i){try{return fn(x,i);}catch(e){skipped++;console.warn('row skipped',e&&e.message);return '';}}).join('');
 return html+(skipped?('<div class="empty-sub" style="padding:8px 0">'+skipped+' record'+(skipped===1?'':'s')+' could not be displayed</div>'):'');
}
function toast(msg,ms){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},ms||2800);}

const WORK_TYPES=Object.keys(GEARSETS);
function gearset(wt){return GEARSETS[wt]||GEARSETS.maintenance;}
function stageDef(item){return gearset(item.work_type).stages.find(s=>s.key===item.stage)||gearset(item.work_type).stages[0];}
function stageLabel(item){return stageDef(item).label;}
function isTerminal(item){const st=gearset(item.work_type).stages;return item.stage===st[st.length-1].key;}
function metaOf(item){if(item.blocked_reason&&!isTerminal(item))return 'blocked';return stageDef(item).meta;}
function wtBadge(wt){const g=gearset(wt);const cls={system:'purple',website:'blue',maintenance:'amber',seo:'green'}[wt]||'neutral';return '<span class="badge '+cls+'">'+esc(g.label)+'</span>';}

/* ---------- date/format helpers ---------- */
function fmtDate(d){if(!d)return '-';const p=String(d).slice(0,10).split('-');if(p.length!==3)return esc(d);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return parseInt(p[2],10)+' '+M[parseInt(p[1],10)-1]+' '+p[0];}
function fmtYM(ym){const p=String(ym).split('-');const M=['January','February','March','April','May','June','July','August','September','October','November','December'];return (M[parseInt(p[1],10)-1]||'')+' '+p[0];}
function daysBetween(a,b){return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000);}
function addDays(iso,n){const d=new Date(iso+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function addMonths(iso,n){const d=new Date(iso+'T00:00:00Z');d.setUTCMonth(d.getUTCMonth()+n);return d.toISOString().slice(0,10);}
function timeAgo(ts){if(!ts)return '';const s=(new Date(nowISO())-new Date(ts))/1000;if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function fmtHours(sec){if(!sec)return '0h';const h=sec/3600;return h>=10?Math.round(h)+'h':(Math.round(h*10)/10)+'h';}
function fmtLKR(n){return 'LKR '+Number(n||0).toLocaleString('en-US');}
function clientName(id){if(id==null)return 'BB Internal';const c=(DATA.clients||[]).find(c=>Number(c.id)===Number(id));return c?c.name:'Client #'+id;}
function memberName(id){const m=(DATA.team||[]).find(m=>Number(m.id)===Number(id));return m?m.name:'';}
/* heuristic guard: warn if a note looks like a pasted secret */
function looksLikeSecret(s){if(!s)return false;return /[A-Za-z0-9_\-\/+=]{24,}/.test(s.replace(/https?:\S+/g,''))||/password\s*[:=]\s*\S+/i.test(s);}

/* ================================================================
   SECTION 2 - DATA LAYER
   One DATA object, one DBW write seam. Demo = in-memory, reseeds
   every reload, ZERO Supabase traffic. Live = shared Supabase with
   silent app auth (same trust model as the Video System).
   ================================================================ */
let sb=null;
let DATA={clients:[],team:[],items:[],hist:[],comments:[],links:[],access:[],props:[],recurring:[],deploys:[],ranks:[],alerts:[]};
const TBL={dev_items:'items',dev_stage_history:'hist',dev_item_comments:'comments',dev_item_links:'links',
 dev_client_access:'access',dev_properties:'props',dev_recurring:'recurring',dev_deploys:'deploys',dev_seo_ranks:'ranks'};
let _seq=5000;

const DBW={
 async insert(table,row){
  const key=TBL[table];if(!key)throw new Error('unknown table '+table);
  if(MODE==='demo'){const r=Object.assign({id:++_seq,created_at:nowISO()},row);DATA[key].push(r);return r;}
  const res=await sb.from(table).insert(row).select().single();
  if(res.error){window.bbReportDbError&&window.bbReportDbError(table,'insert',res.error);throw res.error;}
  DATA[key].push(res.data);return res.data;
 },
 async update(table,id,patch){
  const key=TBL[table];if(!key)throw new Error('unknown table '+table);
  const local=DATA[key].find(r=>Number(r.id)===Number(id));
  if(local)Object.assign(local,patch);
  if(MODE==='demo')return local;
  const res=await sb.from(table).update(patch).eq('id',Number(id));
  if(res.error){window.bbReportDbError&&window.bbReportDbError(table,'update',res.error);throw res.error;}
  return local;
 },
 async del(table,id){
  const key=TBL[table];if(!key)throw new Error('unknown table '+table);
  const i=DATA[key].findIndex(r=>Number(r.id)===Number(id));
  if(i>-1)DATA[key].splice(i,1);
  if(MODE==='demo')return;
  const res=await sb.from(table).delete().eq('id',Number(id));
  if(res.error){window.bbReportDbError&&window.bbReportDbError(table,'delete',res.error);throw res.error;}
 }
};

/* ---------- THE CARE ENGINE: recurring templates spawn cards ----------
   Idempotent: a template only spawns when due AND it has no open card. */
async function runCareEngine(){
 const T=todayISO();let spawned=0;
 for(const r of (DATA.recurring||[])){
  if(!r.active||!r.next_due||r.next_due>T)continue;
  const open=(DATA.items||[]).some(it=>Number(it.recurring_id)===Number(r.id)&&!isTerminal(it)&&!it.is_archived);
  if(open)continue;
  const g=gearset(r.work_type);
  try{
   const item=await DBW.insert('dev_items',{client_id:r.client_id,title:r.title,work_type:r.work_type,
    stage:g.stages[0].key,priority:r.priority||'normal',deadline:r.next_due,source:'recurring',recurring_id:r.id,
    assigned_to:devMemberId(),created_by:'care-engine'});
   await DBW.insert('dev_stage_history',{item_id:item.id,stage:g.stages[0].key,moved_by:'care-engine',entered_at:nowISO()});
   const next=r.cadence==='weekly'?addDays(r.next_due,7):r.cadence==='quarterly'?addMonths(r.next_due,3):
    r.cadence==='interval'?addDays(r.next_due,Math.max(1,Number(r.interval_days)||7)):addMonths(r.next_due,1);
   await DBW.update('dev_recurring',r.id,{next_due:next,last_generated:T});
   spawned++;
  }catch(e){console.warn('care engine spawn failed',e&&e.message);}
 }
 return spawned;
}

function openItems(){return (DATA.items||[]).filter(it=>!it.is_archived);}
function activeItems(){return openItems().filter(it=>!isTerminal(it));}

function computeStageTime(itemId){
 const rows=(DATA.hist||[]).filter(h=>Number(h.item_id)===Number(itemId));
 const by={};let total=0;
 rows.forEach(h=>{
  let sec=h.duration_seconds;
  if(sec==null&&h.entered_at&&!h.exited_at)sec=Math.max(0,(new Date(nowISO())-new Date(h.entered_at))/1000);
  sec=Number(sec)||0;by[h.stage]=(by[h.stage]||0)+sec;total+=sec;
 });
 return {by,total};
}

async function moveItem(item,newStage,skipGate){
 if(item.stage===newStage)return;
 const g=gearset(item.work_type);
 if(!g.stages.some(s=>s.key===newStage)){toast('Invalid stage');return;}
 const last=g.stages[g.stages.length-1].key;
 if(newStage===last&&!skipGate){openCloseOut(item);return;}
 try{
  const open=(DATA.hist||[]).find(h=>Number(h.item_id)===Number(item.id)&&!h.exited_at);
  if(open){
   const dur=Math.max(0,Math.floor((new Date(nowISO())-new Date(open.entered_at))/1000));
   await DBW.update('dev_stage_history',open.id,{exited_at:nowISO(),duration_seconds:dur});
  }
  await DBW.insert('dev_stage_history',{item_id:item.id,stage:newStage,moved_by:CURRENT?CURRENT.name:'system',entered_at:nowISO()});
  const patch={stage:newStage};
  if(newStage===last)patch.completed_at=nowISO();
  if(newStage===last&&item.blocked_reason){patch.blocked_reason=null;patch.blocked_note=null;}
  await DBW.update('dev_items',item.id,patch);
  toast(esc(stageLabel(item))+' &rarr; done'===''?'':'Moved to '+esc(g.stages.find(s=>s.key===newStage).label));
  renderPageRefresh();
 }catch(e){toast('Move failed: '+esc(e&&e.message||''));}
}

function openCloseOut(item){
 const needsRC=!!item.severity;

 openModal(modalHead('Close out: '+esc(item.title))+
  '<div class="modal-b">'+
  (needsRC?'<div class="fld"><label>Root cause (required for bugs, BB law)</label><textarea id="coRC" placeholder="What actually caused it? Not the symptom.">'+esc(item.root_cause||'')+'</textarea></div>':'')+
  (needsNote?'<div class="fld"><label>Client receipt line (goes on the monthly report)</label><textarea id="coNote" placeholder="One plain-English line: what did we do for them?">'+esc(item.client_note||'')+'</textarea><div class="hint">Written now = the monthly report writes itself.</div></div>':'')+
  ((!needsRC&&!needsNote)?'<div class="empty-sub">No gate for this one. Confirm to close it.</div>':'')+
  '</div><div class="modal-f"><button class="btn-ghost" onclick="closeModal()">Cancel</button>'+
  '<button class="btn-primary" onclick="confirmCloseOut('+item.id+')">'+I.check+' Mark done</button></div>');
}
async function confirmCloseOut(id){
 const item=(DATA.items||[]).find(i=>Number(i.id)===Number(id));if(!item)return;
 const rcEl=document.getElementById('coRC'),noteEl=document.getElementById('coNote');
 const patch={};
 if(rcEl){const v=rcEl.value.trim();if(!v){toast('Root cause required before a bug closes');return;}patch.root_cause=v;}
 if(noteEl){const v=noteEl.value.trim();if(!v){toast('Add the client receipt line first');return;}patch.client_note=v;}
 try{
  if(Object.keys(patch).length)await DBW.update('dev_items',item.id,patch);
  closeModal();
  const g=gearset(item.work_type);
  await moveItem(item,g.stages[g.stages.length-1].key,true);
 }catch(e){toast('Close failed: '+esc(e&&e.message||''));}
}

 if(it.is_live&&!isTerminal(it))chips+='<span class="badge red">Live</span>';
 if(it.blocked_reason&&!isTerminal(it))chips+='<span class="badge red">Blocked</span>';
 if(it.seo_kind)chips+='<span class="badge green">'+esc((SEO_KINDS[it.seo_kind]||{}).label||it.seo_kind)+(it.seo_state?' &middot; '+esc(it.seo_state):'')+'</span>';
 if(it.source==='recurring')chips+='<span class="badge blue">Care</span>';
 return '<div class="'+cls+'" draggable="true" data-id="'+it.id+'" onclick="openItem('+it.id+')">'+
  (chips?'<div class="wc-top">'+chips+'</div>':'')+
  '<div class="wc-title">'+esc(it.title)+'</div>'+
  '<div class="wc-meta"><span class="wc-client">'+esc(clientName(it.client_id))+'</span>'+
  (it.deadline?'<span class="'+(late?'late':'')+'">'+I.cal+' '+fmtDate(it.deadline)+'</span>':'')+
  (it.est_hours?'<span>'+I.clock+' '+it.est_hours+'h</span>':'')+
  '</div>'+
  (function(){const st=gearset(it.work_type).stages;const idx=Math.max(0,st.findIndex(s=>s.key===it.stage));
   const pct=Math.round(((idx+1)/st.length)*100);
   return '<div class="wc-prog"><i class="'+(isTerminal(it)?'full':'')+'" style="width:'+pct+'%"></i></div>';})()+
  '</div>';
}

/* comment images: compress -> Storage URL. NEVER base64 into the DB. */
let _pendingImg=null;
function attachCmtImage(input){
 const f=input.files&&input.files[0];if(!f)return;
 compressImage(f,1200,blob=>{_pendingImg=blob;const n=document.getElementById('cmtImgNote');if(n)n.textContent='Image attached ('+Math.round(blob.size/1024)+'KB)';});
}
function compressImage(file,maxW,cb){
 const img=new Image();
 img.onload=function(){
  const scale=Math.min(1,maxW/img.width);
  const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  c.toBlob(b=>cb(b||file),'image/jpeg',0.82);
 };
 img.onerror=function(){cb(file);};
 img.src=URL.createObjectURL(file);
}
async function postComment(itemId){
 const b=document.getElementById('cmtBody');
 const body=(b.value||'').trim();
 if(!body&&!_pendingImg){toast('Nothing to post');return;}
 let image_url=null;
 try{
  if(_pendingImg){
   if(MODE==='demo'){image_url=URL.createObjectURL(_pendingImg);}
   else{
    const path='dev/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.jpg';
    const up=await sb.storage.from(STORAGE_BUCKET).upload(path,_pendingImg,{contentType:'image/jpeg'});
    if(up.error)throw up.error;
    image_url=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
   }
  }
  await DBW.insert('dev_item_comments',{item_id:itemId,body:body,image_url:image_url,author:CURRENT.name});
  _pendingImg=null;renderPageRefresh();
 }catch(e){toast('Post failed: '+esc(e&&e.message||''));}
}

function rankRows(clientId){
 const rows=(DATA.ranks||[]).filter(r=>Number(r.client_id)===Number(clientId));

 return Object.entries(by).map(([kw,list])=>{
  list.sort((a,b)=>String(a.checked_at).localeCompare(String(b.checked_at)));

  const delta=first&&last&&list.length>1?Math.round(first.position-last.position):0;
  return {kw,pos:last?last.position:null,delta,checked:last?last.checked_at:null};
 });

function runbookScore(p){
 const checks=[!!p.url,!!p.hosted_where,!!p.deploy_notes,!!p.gotchas,!!(p.repo||p.supabase_project)];
 const got=checks.filter(Boolean).length;
 return {got,of:checks.length,pct:Math.round(got/checks.length*100)};
}
function propHealth(p){
 const T=todayISO();const flags=[];
 if(p.ssl_expiry){const d=daysBetween(T,p.ssl_expiry);if(d<0)flags.push({sev:'red',msg:'SSL EXPIRED'});else if(d<=14)flags.push({sev:'red',msg:'SSL expires in '+d+'d'});else if(d<=30)flags.push({sev:'amber',msg:'SSL expires in '+d+'d'});}
 if(p.domain_expiry){const d=daysBetween(T,p.domain_expiry);if(d<0)flags.push({sev:'red',msg:'Domain EXPIRED'});else if(d<=30)flags.push({sev:'amber',msg:'Domain expires in '+d+'d'});}
 if(p.last_health_check){const d=daysBetween(p.last_health_check,T);if(d>30)flags.push({sev:'amber',msg:'Not checked in '+d+'d'});}
 else flags.push({sev:'amber',msg:'Never health-checked'});
 return flags;
}

function monthsBack(n){
 const out=[];let d=todayISO().slice(0,7);
 for(let i=0;i<n;i++){out.push(d);const p=d.split('-');let y=+p[0],m=+p[1]-1;if(m<1){m=12;y--;}d=y+'-'+String(m).padStart(2,'0');}
 return out;
}

/* THE QUOTE CALIBRATOR: estimate vs actual = pricing truth */
function repTimeHtml(){
 const done=openItems().filter(it=>isTerminal(it));
 const byType=WORK_TYPES.map(wt=>{
  const list=done.filter(it=>it.work_type===wt);
  const withTime=list.map(it=>({it,t:computeStageTime(it.id).total})).filter(x=>x.t>0);
  const avgSec=withTime.length?withTime.reduce((s,x)=>s+x.t,0)/withTime.length:0;
  const withEst=list.filter(it=>it.est_hours);
  const avgEst=withEst.length?withEst.reduce((s,it)=>s+Number(it.est_hours),0)/withEst.length:0;
  return {wt,n:list.length,avgSec,avgEst};
 });
 return '<div class="stat-grid">'+byType.map(r=>
 '<div class="stat-card"><div class="stat-lbl">'+esc(GEARSETS[r.wt].label)+' avg</div>'+
 '<div class="stat-val accent">'+(r.avgSec?fmtHours(r.avgSec):'-')+'</div>'+
 '<div class="stat-note">'+r.n+' done'+(r.avgEst?' &middot; est avg '+(Math.round(r.avgEst*10)/10)+'h':'')+'</div></div>').join('')+'</div>'+
 '<div class="card"><div class="card-h"><h3>Estimate vs actual (the pricing truth)</h3></div><div class="card-b tbl-wrap">'+
 '<table class="tbl"><thead><tr><th>Work</th><th>Type</th><th>Estimated</th><th>Actual</th><th>Verdict</th></tr></thead><tbody>'+
 (done.length?mapSafe(done,it=>{
  const t=computeStageTime(it.id).total;
  const est=Number(it.est_hours)||0;
  const actH=t/3600;
  const over=est&&actH>est*1.25,under=est&&actH<est*0.75&&t>0;
  return '<tr><td>'+esc(it.title)+'</td><td>'+wtBadge(it.work_type)+'</td>'+
  '<td>'+(est?est+'h':'-')+'</td><td>'+(t?fmtHours(t):'-')+'</td>'+
  '<td>'+(!est||!t?'<span class="badge neutral">no data</span>':over?'<span class="badge red">underquoted</span>':under?'<span class="badge green">fast</span>':'<span class="badge green">on estimate</span>')+'</td></tr>';
 }):'<tr><td colspan="5"><div class="empty-state"><div class="empty-title">Nothing completed yet</div><div class="empty-sub">Every closed card feeds the true cost of a build</div></div></td></tr>')+
 '</tbody></table></div></div>';
}

function updateBell(){const d=document.getElementById('bellDot');if(d)d.hidden=!(DATA.alerts||[]).some(a=>!a.read_at);}

const RENDERERS={today:renderToday,board:renderBoard,clients:renderClients,keyring:renderKeyring,care:renderCare,deploys:renderDeploys,reports:renderReports,system:renderSystem};

/* ================================================================
   SECTION 11.5 - SMART LAYER: next best action, the Dev Sentinel,
   command palette (Ctrl+K), count-up numbers
   ================================================================ */
function nextBestAction(){
 const T=todayISO();
 const act=activeItems().filter(it=>!it.blocked_reason);
 const fire=act.filter(it=>it.severity==='critical'||it.is_live||it.is_blocking)
  .sort((a,b)=>((b.severity==='critical')-(a.severity==='critical'))||((b.is_live?1:0)-(a.is_live?1:0)));
 if(fire.length)return fire[0];
 const due=act.filter(it=>it.deadline&&it.deadline<=T).sort((a,b)=>String(a.deadline).localeCompare(String(b.deadline)));
 if(due.length)return due[0];
 const pr={urgent:0,high:1,normal:2,low:3};
 const rest=act.slice().sort((a,b)=>(pr[a.priority]!==undefined?pr[a.priority]:2)-(pr[b.priority]!==undefined?pr[b.priority]:2));
 return rest[0]||null;
}
/* THE DEV SENTINEL: derived signals, no AI, reads as intelligence */
function computeAttention(){
 const out=[];const T=todayISO();const now=new Date(nowISO());
 activeItems().forEach(it=>{
  if(it.blocked_reason)return;
  const open=(DATA.hist||[]).find(h=>Number(h.item_id)===Number(it.id)&&!h.exited_at);
  if(open&&open.entered_at){
   const d=Math.floor((now-new Date(open.entered_at))/86400000);
   const lim=metaOf(it)==='review'?3:5;
   if(d>=lim)out.push({sev:d>=lim*2?'red':'amber',msg:'"'+it.title+'" has sat in '+stageLabel(it)+' for '+d+' days',fn:'openItem('+it.id+')'});
  }
 });
 (DATA.props||[]).forEach(p=>propHealth(p).forEach(f=>out.push({sev:f.sev,msg:p.name+': '+f.msg,fn:'openPropForm('+p.id+')'})));
 (DATA.recurring||[]).forEach(r=>{if(r.active&&r.next_due&&r.next_due<T)out.push({sev:'amber',msg:'Care overdue: '+r.title,fn:"go('care')"});});
 (DATA.deploys||[]).forEach(dp=>{if(dp.status==='live'&&!dp.verified)out.push({sev:'amber',msg:'Deploy not eye-verified yet: '+dp.what_changed,fn:"go('deploys')"});});
 const rank={red:0,amber:1};
 out.sort((a,b)=>(rank[a.sev]!==undefined?rank[a.sev]:2)-(rank[b.sev]!==undefined?rank[b.sev]:2));
 return out;
}
function animateCounts(root){
 try{if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)return;}catch(e){}
 (root||document).querySelectorAll('.stat-val').forEach(el=>{
  const raw=el.textContent.trim();
  if(!/^\d{1,4}$/.test(raw))return;
  const n=parseInt(raw,10);if(!n)return;
  const t0=performance.now();
  const step=t=>{const p=Math.min(1,(t-t0)/450);el.textContent=String(Math.round(n*(p*(2-p))));if(p<1&&el.isConnected)requestAnimationFrame(step);};
  requestAnimationFrame(step);
 });
}
/* command palette */
let CMDK={res:[],sel:0};
function cmdkResults(q){
 q=String(q||'').toLowerCase().trim();
 const out=[];
 const hit=s=>String(s||'').toLowerCase().indexOf(q)>-1;
 NAV.forEach(n=>{if(!q||hit(n.label))out.push({label:n.label,kind:'Page',icon:n.icon,run:function(){go(n.key);}});});
 [['New work','plus',function(){openItemForm();}],
  ['Log deploy','rocket',function(){openDeployForm();}],
  ['New recurring','wrench',function(){openRecurringForm();}],
  ['Run self-test','shield',function(){runSelfTest({all:true});}]].forEach(a=>{if(!q||hit(a[0]))out.push({label:a[0],kind:'Action',icon:a[1],run:a[2]});});
 if(q){
  activeItems().forEach(it=>{if(hit(it.title))out.push({label:it.title,kind:gearset(it.work_type).label,icon:'box',run:function(){openItem(it.id);}});});
  (DATA.clients||[]).forEach(c=>{if(hit(c.name))out.push({label:c.name,kind:'Client',icon:'user',run:function(){openClient(c.id);}});});
  (DATA.props||[]).forEach(p=>{if(hit(p.name))out.push({label:p.name,kind:'Property',icon:'globe',run:function(){openPropForm(p.id);}});});
 }
 return out.slice(0,12);
}
function openCmdk(){
 if(!CURRENT)return;
 closeCmdk();
 const d=document.createElement('div');d.id='cmdkRoot';
 d.innerHTML='<div class="cmdk-ov" onclick="if(event.target===this)closeCmdk()"><div class="cmdk">'+
 '<div class="cmdk-in">'+I.search+'<input id="cmdkInput" placeholder="Jump to work, clients, pages, actions..." oninput="cmdkType(this.value)" onkeydown="cmdkKey(event)" autocomplete="off"></div>'+
 '<div class="cmdk-list" id="cmdkList"></div>'+
 '<div class="cmdk-hint"><span><kbd>&uarr;</kbd> <kbd>&darr;</kbd> navigate</span><span><kbd>Enter</kbd> open</span><span><kbd>Esc</kbd> close</span></div>'+
 '</div></div>';
 document.body.appendChild(d);
 cmdkType('');
 const inp=document.getElementById('cmdkInput');if(inp)inp.focus();
}
function closeCmdk(){const d=document.getElementById('cmdkRoot');if(d)d.remove();}
function cmdkType(v){CMDK.res=cmdkResults(v);CMDK.sel=0;renderCmdkList();}
function renderCmdkList(){
 const el=document.getElementById('cmdkList');if(!el)return;
 el.innerHTML=CMDK.res.length?CMDK.res.map((r,i)=>'<div class="cmdk-item'+(i===CMDK.sel?' sel':'')+'" onclick="cmdkExec('+i+')">'+(I[r.icon]||I.box)+'<span>'+esc(r.label)+'</span><small>'+esc(r.kind)+'</small></div>').join('')
  :'<div class="empty-state"><div class="empty-title">No matches</div></div>';
}
function cmdkKey(e){
 if(e.key==='ArrowDown'){e.preventDefault();CMDK.sel=Math.min(CMDK.res.length-1,CMDK.sel+1);renderCmdkList();}
 else if(e.key==='ArrowUp'){e.preventDefault();CMDK.sel=Math.max(0,CMDK.sel-1);renderCmdkList();}
 else if(e.key==='Enter'){e.preventDefault();cmdkExec(CMDK.sel);}
}
function cmdkExec(i){
 const r=CMDK.res[i];if(!r)return;
 closeCmdk();
 try{r.run();}catch(e){console.warn('cmdk',e&&e.message);}
}
document.addEventListener('keydown',function(e){
 if((e.metaKey||e.ctrlKey)&&String(e.key).toLowerCase()==='k'){e.preventDefault();if(CURRENT)openCmdk();}
 else if(e.key==='Escape'){closeCmdk();closeModal();}
});

/* ================================================================
   SECTION 12 - SELF-TEST HARNESS (ported from bb-master-skeleton)
   Snapshot everything -> run ~40 checks on seeded demo data with the
   write seam in demo mode -> restore in finally. Zero footprint.
   Gate: ALL GREEN at ~390px AND desktop, twice each.
   ================================================================ */
async function runSelfTest(opts){
 const R=[];const ok=(name,pass,detail)=>{R.push({name:name,pass:!!pass,detail:detail||''});};
 /* ---- snapshot ---- */
 const snapMode=MODE,snapData=JSON.stringify(DATA),snapCur=CURRENT?JSON.parse(JSON.stringify(CURRENT)):null;
 const snapBoard=BOARD_FILTER,snapRepTab=REP_TAB,snapRepC=REP_CLIENT,snapRepM=REP_MONTH;
 const snapTheme=document.documentElement.getAttribute('data-theme');
 const snapPage=((document.querySelector('.page.active')||{}).id||'page-today').replace('page-','');
 const snapIn=document.getElementById('app').classList.contains('on');
 const bootLog=window.__ST_LOG.slice();
 try{
  MODE='demo';DATA=seedData();
  if(!CURRENT)signIn(USERS[0]);
  /* ---- A0 boot integrity ---- */
  ok('Globals present',!!(DATA&&DBW&&GEARSETS&&RENDERERS&&typeof go==='function'));
  ok('No uncaught errors at boot',!bootLog.some(l=>l.kind==='uncaught'||l.kind==='rejection'),
   bootLog.filter(l=>l.kind==='uncaught'||l.kind==='rejection').map(l=>l.msg).join('; ').slice(0,120));
  (function(){
   const names={},dups=[];
   for(const s of document.scripts){
    if(s.src)continue;
    const re=/^(?:const|let|function)\s+([A-Za-z_$][\w$]*)/gm;let m;
    while((m=re.exec(s.textContent))){if(names[m[1]])dups.push(m[1]);names[m[1]]=1;}
   }
   ok('No duplicate top-level identifiers',dups.length===0,dups.join(', '));
  })();
  (function(){
   const seen={},dups=[];
   document.querySelectorAll('[id]').forEach(el=>{if(seen[el.id])dups.push(el.id);seen[el.id]=1;});
   ok('No duplicate DOM ids',dups.length===0,dups.slice(0,5).join(', '));
  })();
  /* gearsets */
  const metaKeys=META_STAGES.map(m=>m.key);
  let gearsOk=true,gearDetail='';
  WORK_TYPES.forEach(wt=>{
   const st=GEARSETS[wt].stages;
   st.forEach(s=>{if(!metaKeys.includes(s.meta)){gearsOk=false;gearDetail=wt+'/'+s.key;}});
   if(st[st.length-1].meta!=='done'){gearsOk=false;gearDetail=wt+' terminal not done';}
  });
  ok('Gearset integrity: every stage maps to a meta-stage, terminals are done',gearsOk,gearDetail);
  ok('Every seeded item sits on a real stage',DATA.items.every(it=>gearset(it.work_type).stages.some(s=>s.key===it.stage)));
  /* ---- A1 roles + routing ---- */
  ok('Unknown route bounces to Today',(function(){go('not_a_page');return document.getElementById('page-today').classList.contains('active');})());
  (function(){
   const was=CURRENT.role;CURRENT.role='dev';
   const devCan=canAdmin();
   CURRENT.role=was;
   ok('Dev role is not admin (commission paid-toggle gated)',devCan===false&&(was!=='admin'||canAdmin()));
  })();
  /* ---- A1.5 smart layer ---- */
  ok('Next-best-action picks the live critical bug first',(nextBestAction()||{}).id===5);
  const attn0=computeAttention();
  ok('Dev Sentinel flags the expiring SSL certificate',attn0.some(a=>a.msg.indexOf('SSL')>-1),attn0.length+' signals');
  ok('Command palette finds clients and work by fragment',cmdkResults('gem').some(r=>r.kind==='Client')&&cmdkResults('checkout').length>0);
  closeCmdk();
  /* ---- A2 board mechanics ---- */
  const it1=DATA.items.find(i=>i.id===1);
  const openBefore=DATA.hist.find(h=>h.item_id===1&&!h.exited_at);
  await moveItem(it1,'self_test');
  const closed=DATA.hist.find(h=>h.id===openBefore.id);
  const newOpen=DATA.hist.find(h=>h.item_id===1&&!h.exited_at);
  ok('Stage move closes the open history row with a duration',!!(closed&&closed.exited_at&&closed.duration_seconds>=0),closed?'dur '+closed.duration_seconds:'no row');
  ok('Stage move opens a new history row on the new stage',!!(newOpen&&newOpen.stage==='self_test'&&it1.stage==='self_test'));
  /* Root-Cause Lock */
  const bug=DATA.items.find(i=>i.id===5);
  await moveItem(bug,'done');
  const gateHeld=bug.stage!=='done'&&!!document.querySelector('.modal-ov');
  closeModal();
  ok('ROOT-CAUSE LOCK: a bug cannot close without a root cause (gate modal held it)',gateHeld,'stage '+bug.stage);
  bug.root_cause='Sticky footer overlapped the tap target below 400px.';
  bug.client_note='Fixed the checkout button that was unclickable on phones.';
  await moveItem(bug,'done',true);
  ok('With root cause + receipt line the bug closes and stamps completed_at',bug.stage==='done'&&!!bug.completed_at);
  /* blocked flag round trip */
  const blk=DATA.items.find(i=>i.id===6);
  const stageBefore=blk.stage;
  ok('Blocked item shows in the Blocked meta-lane',metaOf(blk)==='blocked');
  await DBW.update('dev_items',blk.id,{blocked_reason:null,blocked_note:null});
  ok('Unblocking returns the card to its real stage (flag, not a stage)',blk.stage===stageBefore&&metaOf(blk)!=='blocked');
  await DBW.update('dev_items',blk.id,{blocked_reason:'content'});
  /* meta view accounts for every active card */
  const act=activeItems();
  const metaSum=META_STAGES.reduce((n,m)=>n+act.filter(it=>metaOf(it)===m.key).length,0);
  ok('All view accounts for every active card exactly once',metaSum===act.length,metaSum+' vs '+act.length);
  /* ---- A3 care engine ---- */
  const dueBefore=DATA.items.length;
  const s1=await runCareEngine();
  const spawned=DATA.items.find(i=>Number(i.recurring_id)===302&&!isTerminal(i));
  ok('Care engine spawns the due monthly health check',s1>=1&&!!spawned,'spawned '+s1);
  const rec302=DATA.recurring.find(r=>r.id===302);
  ok('Care engine advances next_due past today',rec302.next_due>todayISO(),rec302.next_due);
  const s2=await runCareEngine();
  ok('CARE ENGINE IS IDEMPOTENT: second run spawns nothing new',s2===0&&DATA.items.length===dueBefore+s1,'second run '+s2);
  /* ---- A4 keyring ---- */
  ok('Missing-access count is honest (missing + lost)',missingAccess(9003)===3,'got '+missingAccess(9003));
  ok('Every access type has a ready request message',ACCESS_TYPES.every(t=>(ACCESS_REQ_MSGS[t.key]||'').length>40));
  ok('Secret-paste guard fires on credential-looking text',looksLikeSecret('password: hunter22x9')===true&&looksLikeSecret('client Google account, BB delegate')===false);
  const accN=DATA.access.length;
  await DBW.insert('dev_client_access',{client_id:9004,access_type:'gsc',status:'requested',updated_by:'selftest'});
  ok('Keyring write path works',DATA.access.length===accN+1);
  /* ---- A5 reports ---- */
  REP_CLIENT='9002';REP_MONTH=todayISO().slice(0,7);
  const repHtml=repClientHtml();
  ok('Client report assembles from receipt lines',repHtml.indexOf('Renewed the site security certificate')>-1);
  const web=DATA.items.find(i=>i.id===3);
  ok('Commission math: value x pct',Math.round(web.project_value*web.commission_pct/100)===18000);
  ok('Time truth: stage history sums to a real total',computeStageTime(12).total>0);
  /* ---- A6 page sweep: render, not blank, no overflow, rects clean ---- */
  const vw=window.innerWidth;
  const rectAudit=()=>{const b=[];document.querySelectorAll('.page.active *').forEach(el=>{const cs=getComputedStyle(el);
   if((cs.position==='fixed'||cs.position==='absolute')&&cs.display!=='none'){const rc=el.getBoundingClientRect();
    if(rc.width>0&&(Math.round(rc.right)>vw+1||Math.round(rc.left)<-1)){
     let p=el.parentElement,clip=false;while(p){if(/(hidden|clip|auto|scroll)/.test(getComputedStyle(p).overflowX)){clip=true;break;}p=p.parentElement;}
     if(!clip)b.push(el.className||el.id||el.tagName);}}});return b;};
  Object.keys(RENDERERS).forEach(pg=>{
   go(pg);
   const el=document.getElementById('page-'+pg);
   const blank=!el||el.innerHTML.trim().length<40;
   const over=document.documentElement.scrollWidth>vw+1;
   const rects=rectAudit();
   ok('Page "'+pg+'": renders, no overflow ('+vw+'px), rects clean',!blank&&!over&&!rects.length,
    (blank?'blank ':'')+(over?'overflow '+document.documentElement.scrollWidth:'')+rects.slice(0,2).join(','));
  });
  /* board in each gearset filter */
  ['all'].concat(WORK_TYPES).forEach(f=>{
   BOARD_FILTER=f;go('board');
   const cols=document.querySelectorAll('#page-board .stage-col').length;
   const want=f==='all'?META_STAGES.length:GEARSETS[f].stages.length;
   ok('Board "'+f+'" shows its own stage columns ('+want+')',cols===want,'got '+cols);
  });
  /* ---- A7 theme sweep ---- */
  toggleTheme();go('today');
  ok('Light theme renders Today without new errors',document.getElementById('page-today').innerHTML.length>40&&document.documentElement.getAttribute('data-theme')==='light');
  toggleTheme();
  /* ---- B resilience: test the safety nets themselves ---- */
  const skipHtml=mapSafe([{a:1},null,{a:3}],x=>'<i>'+x.a+'</i>');
  ok('mapSafe: one bad row cannot blank a list',skipHtml.indexOf('could not be displayed')>-1&&skipHtml.indexOf('<i>1</i>')>-1);
  const evil={id:99999,work_type:'maintenance',stage:'reported',priority:'normal',get title(){throw new Error('selftest-evil-row');}};
  DATA.items.push(evil);
  BOARD_FILTER='maintenance';go('board');
  const bhtml=document.getElementById('page-board').innerHTML;
  ok('Board survives a poisoned record (skip-note shown, others render)',bhtml.indexOf('could not be displayed')>-1);
  DATA.items.pop();
  const origDeploys=RENDERERS.deploys;
  RENDERERS.deploys=function(){throw new Error('selftest-boom');};
  go('deploys');
  const boomed=document.getElementById('page-deploys').innerHTML.indexOf('This view hit a problem')>-1;
  RENDERERS.deploys=origDeploys;
  go('deploys');
  const healed=!document.getElementById('page-deploys').dataset.stErr&&document.getElementById('page-deploys').innerHTML.indexOf('This view hit a problem')===-1;
  ok('Throwing renderer hits the boundary card, then self-heals',boomed&&healed);
  ok('Harness added no stray errors',!window.__ST_LOG.slice(bootLog.length).some(l=>l.kind==='uncaught'||l.kind==='rejection'));
 }catch(e){
  R.push({name:'HARNESS CRASHED: '+String(e&&e.message||e).slice(0,140),pass:false,detail:''});
 }finally{
  /* ---- restore everything ---- */
  MODE=snapMode;DATA=JSON.parse(snapData);
  BOARD_FILTER=snapBoard;REP_TAB=snapRepTab;REP_CLIENT=snapRepC;REP_MONTH=snapRepM;
  document.documentElement.setAttribute('data-theme',snapTheme||'dark');
  closeModal();window._openItemId=null;
  if(snapCur){CURRENT=snapCur;
   document.getElementById('meName').textContent=CURRENT.name;
   document.getElementById('meRole').textContent=CURRENT.title||'';
   document.getElementById('meAv').textContent=CURRENT.name[0];
  }else{signOut();}
  applyModeChip();
  if(snapIn||snapCur)go(snapPage);
  window.__ST_LOG.length=bootLog.length;
 }
 const failed=R.filter(r=>!r.pass);
 stReport(R,failed);
 try{console.table(R.map(r=>({check:r.name,pass:r.pass})));}catch(e){}
 return {pass:failed.length===0,failed:failed,results:R,viewport:window.innerWidth};
}
function stReport(R,failed){
 const old=document.getElementById('stOv');if(old)old.remove();
 const ov=document.createElement('div');ov.className='st-ov';ov.id='stOv';
 ov.innerHTML='<div class="st-panel"><div class="st-head">'+
 '<span class="st-badge '+(failed.length?'fail':'pass')+'">'+(failed.length?failed.length+' FAILED':'ALL GREEN')+'</span>'+
 '<span class="hint">'+R.length+' checks &middot; '+window.innerWidth+'px viewport &middot; '+(failed.length?'NOT handoverable':'gate passed at this width. Run at ~390px AND desktop, twice each.')+'</span></div>'+
 '<div class="st-body">'+R.map(r=>'<div class="st-row '+(r.pass?'p':'f')+'">'+(r.pass?I.check:I.x)+'<span>'+esc(r.name)+
 (r.detail?'<span class="det">'+esc(r.detail)+'</span>':'')+'</span></div>').join('')+'</div>'+
 '<div class="st-foot"><button class="btn-ghost" onclick="document.getElementById(\'stOv\').remove()">Close</button>'+
 '<button class="btn-primary" onclick="runSelfTest({all:true})">Re-run</button></div></div>';
 document.body.appendChild(ov);
}

/* ================================================================
   SECTION 13 - BOOT
   ================================================================ */
let _refreshTimer=null;

 try{const th=localStorage.getItem('bbdev_theme');if(th)document.documentElement.setAttribute('data-theme',th);}catch(e){}
 renderLogin();applyModeChip();updateClock();setInterval(updateClock,30000);

 if(MODE==='live'&&!okInit){

 }
 await fetchAll();
 snapshotPages();
 try{await runCareEngine();}catch(e){console.warn('care engine',e&&e.message);}
 updateBell();
 /* session restore */
 try{
  const saved=sessionStorage.getItem('bb_dev_user');
  if(saved){const u=USERS.find(x=>x.name===(JSON.parse(saved)||{}).name);if(u)signIn(u);}
 }catch(e){}
 /* gentle live refresh, Video System pattern: skip when hidden or a modal is open */

   if(document.hidden)return;

 }
 if(location.search.indexOf('selftest')>-1)setTimeout(()=>runSelfTest({all:true}),300);
}
window.addEventListener('load',boot);
